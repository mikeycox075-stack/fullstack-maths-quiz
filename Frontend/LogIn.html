<body>

	</div>
	<div id="Text_Index">
		<h1>Log In</h1>
		<br>
			<div class="content">
				<form id="login-frm">
					<label for="Em">Email</label>
					<input id="Em" type="text" name="Em" placeholder="Your email...">
					<!-- 	-->
					<label for="Pas">Type in your password...</label>
					<input id="Pas" type="password" name="Pas" placeholder="Please input your password...">
					<!-- login btn -->
					<button class="loginButton" type="submit"> Log in </button>
				</form>
				<button id="loginButton" onclick="location.href='SignUp.html'" type="button">Sign Up</button>
				<br>
			</div>

<script>
	document.getElementById("login-frm").addEventListener("submit", async function(e) {
	    e.preventDefault();

	    const email = document.getElementById("Em").value;
	    const password = document.getElementById("Pas").value;

	    const response = await fetch('http://localhost:5000/api/login', {
	        method: 'POST',
	        headers: {
	            'Content-Type': 'application/json'
	        },
	        body: JSON.stringify({
	            email: email,
	            password: password
	        })
	    });

	    const data = await response.json();

	    if (data.token) {
	        localStorage.setItem('token', data.token);

	        alert("Login successful!");

	        window.location.href = "Quiz.html";
	    } else {
	        alert(data.message);
	    }
	});
</script>
